<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Tracker</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    transition: background 1s ease;
  }

  .container {
    padding: 40px 20px;
  }

  h1 {
    font-size: 20px;
    font-weight: normal;
    opacity: 0.9;
  }

  .time {
    font-size: 60px;
    font-weight: bold;
    margin: 10px 0 30px;
  }

  hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.4);
    margin: 30px 0;
  }

  .info {
    font-size: 16px;
    margin: 8px 0;
    opacity: 0.9;
  }

  .toggle {
    margin-top: 30px;
    font-size: 16px;
  }

  /* Gradients */
  .sunrise {
    background: linear-gradient(to top, #ff7e5f, #feb47b, #87ceeb);
  }

  .sunset {
    background: linear-gradient(to top, #2c3e50, #fd746c, #ff9068);
  }
</style>
</head>

<body class="sunrise">
<div class="container">

  <h1 id="title">The sun will rise at</h1>
  <div class="time" id="mainTime">--:--</div>

  <hr>

  <div class="info" id="astro">Astronomical Twilight: --:--</div>
  <div class="info" id="nautical">Nautical Twilight: --:--</div>
  <div class="info" id="civil">Civil Twilight: --:--</div>

  <div class="toggle">
    <label>
      <input type="checkbox" id="toggleSunset">
      Show SUNSET
    </label>
  </div>

</div>

<script>
let dataCache = null;

function formatTime(utcString) {
  const date = new Date(utcString);
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function updateUI(isSunset) {
  if (!dataCache) return;

  const d = dataCache;

  if (isSunset) {
    document.body.className = "sunset";
    document.getElementById("title").textContent = "The sun will set at";
    document.getElementById("mainTime").textContent = formatTime(d.sunset);

    document.getElementById("astro").textContent =
      "Astronomical Twilight: " + formatTime(d.astronomical_twilight_end);

    document.getElementById("nautical").textContent =
      "Nautical Twilight: " + formatTime(d.nautical_twilight_end);

    document.getElementById("civil").textContent =
      "Civil Twilight: " + formatTime(d.civil_twilight_end);

  } else {
    document.body.className = "sunrise";
    document.getElementById("title").textContent = "The sun will rise at";
    document.getElementById("mainTime").textContent = formatTime(d.sunrise);

    document.getElementById("astro").textContent =
      "Astronomical Twilight: " + formatTime(d.astronomical_twilight_begin);

    document.getElementById("nautical").textContent =
      "Nautical Twilight: " + formatTime(d.nautical_twilight_begin);

    document.getElementById("civil").textContent =
      "Civil Twilight: " + formatTime(d.civil_twilight_begin);
  }
}

function fetchSunData(lat, lng) {
  fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`)
    .then(res => res.json())
    .then(data => {
      dataCache = data.results;
      updateUI(false);
    });
}

navigator.geolocation.getCurrentPosition(pos => {
  fetchSunData(pos.coords.latitude, pos.coords.longitude);
});

document.getElementById("toggleSunset").addEventListener("change", function() {
  updateUI(this.checked);
});
</script>

</body>
</html>
