<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Tracker</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  transition: background 2s ease;
}

/* SKY GRADIENT */
.sunrise {
  background: linear-gradient(to top, #ff7e5f, #feb47b, #87ceeb);
}

.sunset {
  background: linear-gradient(to top, #1a1a2e, #16213e, #0f3460);
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 2;
  max-width: 400px;
}

/* TEXT */
h1 {
  font-size: 20px;
  opacity: 0.9;
}

.time {
  font-size: 64px;
  font-weight: bold;
  margin: 10px 0 30px;
}

hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.4);
  margin: 30px 0;
}

.info {
  margin: 8px 0;
}

/* HILL */
.hill {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 200px;
  background: #2e7d32;
  border-radius: 50%;
  left: -50%;
  transition: background 2s ease;
}

.sunset .hill {
  background: #0d1b0d;
}

/* SUN / MOON */
.celestial {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  transition: all 2s ease;
}

.sun {
  background: radial-gradient(circle, #fff176, #ff9800);
  box-shadow: 0 0 40px rgba(255,200,0,0.7);
}

.moon {
  background: white;
  box-shadow: 0 0 20px rgba(255,255,255,0.5);
}

/* TOGGLE */
.toggle {
  margin-top: 30px;
}
</style>
</head>

<body class="sunrise">

<div class="container">
  <h1 id="title">The sun will rise at</h1>
  <div class="time" id="mainTime">Loading...</div>

  <hr>

  <div class="info" id="astro"></div>
  <div class="info" id="nautical"></div>
  <div class="info" id="civil"></div>

  <div class="toggle">
    <label>
      <input type="checkbox" id="toggleSunset">
      Show SUNSET
    </label>
  </div>
</div>

<div class="celestial sun" id="celestial"></div>
<div class="hill"></div>

<script>
let dataCache = null;

function formatTime(t) {
  return new Date(t).toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });
}

function updateUI(isSunset) {
  if (!dataCache) return;

  const d = dataCache;
  const celestial = document.getElementById("celestial");

  if (isSunset) {
    document.body.className = "sunset";

    document.getElementById("title").textContent = "The sun will set at";
    document.getElementById("mainTime").textContent = formatTime(d.sunset);

    document.getElementById("astro").textContent =
      "Astronomical Twilight: " + formatTime(d.astronomical_twilight_end);
    document.getElementById("nautical").textContent =
      "Nautical Twilight: " + formatTime(d.nautical_twilight_end);
    document.getElementById("civil").textContent =
      "Civil Twilight: " + formatTime(d.civil_twilight_end);

    celestial.className = "celestial moon";
    celestial.style.bottom = "180px";

  } else {
    document.body.className = "sunrise";

    document.getElementById("title").textContent = "The sun will rise at";
    document.getElementById("mainTime").textContent = formatTime(d.sunrise);

    document.getElementById("astro").textContent =
      "Astronomical Twilight: " + formatTime(d.astronomical_twilight_begin);
    document.getElementById("nautical").textContent =
      "Nautical Twilight: " + formatTime(d.nautical_twilight_begin);
    document.getElementById("civil").textContent =
      "Civil Twilight: " + formatTime(d.civil_twilight_begin);

    celestial.className = "celestial sun";
    celestial.style.bottom = "120px";
  }
}

function fetchSun(lat, lng) {
  fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`)
    .then(r => r.json())
    .then(data => {
      dataCache = data.results;
      updateUI(false);
    });
}

navigator.geolocation.getCurrentPosition(
  pos => fetchSun(pos.coords.latitude, pos.coords.longitude),
  () => fetchSun(47.2529, -122.4443)
);

document.getElementById("toggleSunset")
  .addEventListener("change", e => updateUI(e.target.checked));
</script>

</body>
</html>
